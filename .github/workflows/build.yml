name: Build APK

on:
  push:
    branches: [ main, test5 ]
  pull_request:
    branches: [ main, test5 ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      actions: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ hashFiles('**/*.gradle*') }}
          restore-keys: gradle-

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.2'

      - name: Build debug APK
        env:
          BUILD_NUMBER: ${{ github.run_number }}
        run: gradle assembleDebug --no-daemon --stacktrace

      # ✅ FIX: Dùng wildcard *.apk để tìm đúng file
      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: face-detector-multi-debug
          path: app/build/outputs/apk/debug/*.apk
          retention-days: 30

      # Optional: In danh sách file APK để debug
      - name: List generated APKs
        run: |
          echo "📦 Generated APKs:"
          find app/build/outputs/apk/ -name "*.apk" -type f -exec ls -lh {} \;

      - name: Keep only last 3 artifacts
        uses: actions/github-script@v7
        with:
          script: |
            const artifacts = await github.paginate(
              github.rest.actions.listArtifactsForRepo,
              { owner: context.repo.owner, repo: context.repo.repo, per_page: 100 }
            );
            const filtered = artifacts
              .filter(a => a.name === "face-detector-multi-debug")
              .sort((a, b) => new Date(b.created_at) - new Date(a.created_at));
            const toDelete = filtered.slice(3);
            for (const a of toDelete) {
              await github.rest.actions.deleteArtifact({
                owner: context.repo.owner,
                repo: context.repo.repo,
                artifact_id: a.id
              });
              console.log(`Deleted: ${a.name} (${a.id})`);
            }
            console.log(`Kept: ${Math.min(filtered.length, 3)}, Deleted: ${toDelete.length}`);
