name: Build APK

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      actions: write
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ hashFiles('**/*.gradle*') }}
          restore-keys: gradle-

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.2'

      - name: Build debug APK
        env:
          BUILD_NUMBER: ${{ github.run_number }}
        run: gradle assembleDebug --no-daemon --stacktrace

      - name: List generated APKs
        run: |
          echo "📦 Generated APKs:"
          find app/build/outputs/apk/ -name "*.apk" -type f -exec ls -lh {} \;

      - name: Get current date
        id: date
        run: echo "date=$(date +'%Y%m%d-%H%M')" >> $GITHUB_OUTPUT

      - name: Delete old pre-release
        uses: actions/github-script@v7
        with:
          script: |
            try {
              const releases = await github.rest.repos.listReleases({
                owner: context.repo.owner,
                repo: context.repo.repo,
              });
              const old = releases.data.filter(r => r.tag_name === 'latest-debug');
              for (const r of old) {
                await github.rest.repos.deleteRelease({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  release_id: r.id,
                });
                console.log(`Deleted release: ${r.id}`);
              }
              try {
                await github.rest.git.deleteRef({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  ref: 'tags/latest-debug',
                });
                console.log('Deleted tag: latest-debug');
              } catch (e) {
                console.log('Tag not found, skipping');
              }
            } catch (e) {
              console.log('No old release found, skipping');
            }

      - name: Upload APK lên GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest-debug
          name: "Debug Build #${{ github.run_number }} (${{ steps.date.outputs.date }})"
          body: |
            🔧 Debug build tự động
            - Branch: ${{ github.ref_name }}
            - Commit: ${{ github.sha }}
            - Build: #${{ github.run_number }}
          files: app/build/outputs/apk/debug/*.apk
          prerelease: true
          make_latest: false
