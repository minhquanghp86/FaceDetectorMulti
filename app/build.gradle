apply plugin: 'com.android.application'

android {
    namespace 'com.facedetectormulti'
    compileSdk 34

    defaultConfig {
        applicationId "com.facedetectormulti"
        minSdk 26
        targetSdk 34
        versionCode System.getenv("BUILD_NUMBER") ?
                    System.getenv("BUILD_NUMBER").toInteger() : 1
        versionName "1.0"
    }

    applicationVariants.all { variant ->
        variant.outputs.all {
            outputFileName = "FaceDetectorMulti.apk"
        }
    }

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_11
        targetCompatibility JavaVersion.VERSION_11
    }
}

configurations.all {
    resolutionStrategy {
        force 'org.jetbrains.kotlin:kotlin-stdlib:1.8.22'
        force 'org.jetbrains.kotlin:kotlin-stdlib-jdk7:1.8.22'
        force 'org.jetbrains.kotlin:kotlin-stdlib-jdk8:1.8.22'
    }
}

dependencies {
    // UI
    implementation 'androidx.appcompat:appcompat:1.6.1'
    implementation 'androidx.constraintlayout:constraintlayout:2.1.4'

    // CameraX - cùng version với repo gốc
    implementation 'androidx.camera:camera-core:1.3.1'
    implementation 'androidx.camera:camera-camera2:1.3.1'
    implementation 'androidx.camera:camera-lifecycle:1.3.1'
    implementation 'androidx.camera:camera-view:1.3.1'

    // ML Kit Face Detection - cùng version với repo gốc
    implementation 'com.google.mlkit:face-detection:16.1.5'
}
